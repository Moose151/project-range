{% extends "base.html" %}
{% block title %}Version History{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3 gap-2 flex-wrap">
  <div>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-1">
        <li class="breadcrumb-item"><a href="/docs">Documentation</a></li>
        <li class="breadcrumb-item active">Version History</li>
      </ol>
    </nav>
    <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>Version History</h4>
  </div>
  <a href="/docs" class="btn btn-sm btn-outline-secondary ms-auto">
    <i class="bi bi-arrow-left me-1"></i>Back to Docs
  </a>
</div>

<div class="card border-secondary">
  <div class="card-body doc-content">
    {{ rendered | safe }}
  </div>
</div>
{% endblock %}
