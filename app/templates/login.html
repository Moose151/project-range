<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Project Range</title>
  <!-- Vendored locally so the login page styles on LAN devices with no internet -->
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css?v=8">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-body">
<div class="login-card card shadow-lg border-secondary" style="width:100%;max-width:420px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-reception-4 display-4 text-primary"></i>
      <h3 class="mt-2 mb-0 fw-bold">Project Range</h3>
    </div>

    {% if timeout %}
    <div class="alert alert-warning d-flex align-items-center gap-2">
      <i class="bi bi-clock-history"></i>
      Your session has expired. Please log in again.
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 autofocus autocomplete="username" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
        <label class="form-check-label small" for="remember">
          Remember this terminal
          <span class="text-muted d-block">Stay signed in on this fixed terminal (skips the inactivity timeout)</span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Log In
      </button>
    </form>
  </div>
</div>
<div class="app-version-badge" title="Application version">v{{ app_version | default('0.6.0') }}</div>
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
