<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Project Range</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-body">
<div class="login-card card shadow-lg border-secondary" style="width:100%;max-width:420px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-reception-4 display-4 text-primary"></i>
      <h3 class="mt-2 mb-0 fw-bold">Project Range</h3>
      <span class="badge bg-warning text-dark">MVP / Beta</span>
    </div>

    {% if timeout %}
    <div class="alert alert-warning d-flex align-items-center gap-2">
      <i class="bi bi-clock-history"></i>
      Your session has expired. Please log in again.
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 autofocus autocomplete="username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Log In
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
