<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var d=document.documentElement;d.setAttribute('data-bs-theme',localStorage.getItem('rangeTheme')||'dark');d.setAttribute('data-theme',localStorage.getItem('rangePalette')||'classic');}catch(e){}})();</script>
  <title>Login — SEW Range</title>
  <link rel="icon" type="image/png" href="/static/img/sew-range-logo.png">
  <!-- Vendored locally so the login page styles on LAN devices with no internet -->
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css?v=11">
</head>
<body class="bg-body">
<button type="button" class="btn btn-sm btn-outline-secondary position-fixed top-0 end-0 m-3"
        id="loginThemeToggle"
        title="Toggle light / dark"
        onclick="(function(){var c=document.documentElement.getAttribute('data-bs-theme')||'dark';var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-bs-theme',n);try{localStorage.setItem('rangeTheme',n);}catch(e){}this.querySelector('i').className=n==='dark'?'bi bi-moon-stars':'bi bi-sun-fill';}).call(this)">
  <i class="bi bi-moon-stars"></i>
</button>
<div class="d-flex align-items-center justify-content-center min-vh-100 px-3">
<div class="login-card card shadow-lg border-secondary" style="width:100%;max-width:420px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <img src="/static/img/sew-range-logo.png" alt="SEW Range" style="height:110px" class="mb-2">
      <h3 class="mt-1 mb-0 fw-bold">SEW Range</h3>
    </div>

    {% if timeout %}
    <div class="alert alert-warning d-flex align-items-center gap-2">
      <i class="bi bi-clock-history"></i>
      Your session has expired. Please log in again.
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 autofocus autocomplete="username" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
        <label class="form-check-label small" for="remember">
          Remember this terminal
          <span class="text-muted d-block">Stay signed in on this fixed terminal (skips the inactivity timeout)</span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Log In
      </button>
    </form>
  </div>
</div>
</div>
<div class="app-version-badge" title="Application version">v{{ app_version }}</div>
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script>
  (function(){
    var t = document.documentElement.getAttribute('data-bs-theme') || 'dark';
    var i = document.querySelector('#loginThemeToggle i');
    if (i) i.className = t === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun-fill';
  })();
</script>
</body>
</html>
