services:
  web:
    build: .
    image: project-range:latest
    container_name: project-range
    ports:
      # host:container — browse to http://<host>:7474. Change only the left
      # (host) number to use a different external port; the app listens on 8001
      # inside the container. Allow 7474 through the host firewall for LAN access.
      - "7474:8001"
    environment:
      # REQUIRED in production. Generate with:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      # Compose fails fast if SECRET_KEY is unset (see .env / .env.example).
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: sqlite:////app/data/range.db
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-480}
      SESSION_MAX_AGE_DAYS: ${SESSION_MAX_AGE_DAYS:-30}
      AUDIT_HASH_SECRET: ${AUDIT_HASH_SECRET:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2097152}
      MAX_UPLOAD_TOTAL_BYTES: ${MAX_UPLOAD_TOTAL_BYTES:-8388608}
      MAX_UPLOAD_ZIP_MEMBERS: ${MAX_UPLOAD_ZIP_MEMBERS:-100}
    volumes:
      # Persist the SQLite database across rebuilds/restarts.
      - range-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    restart: unless-stopped

volumes:
  range-data:
